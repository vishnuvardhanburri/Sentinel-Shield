<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Shield Enterprise</title>
    <style>
        body { width: 320px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b1120; color: #f8fafc; padding: 0; margin: 0; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 25px; text-align: center; border-bottom: 1px solid #334155; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin-bottom: 15px; border: 2px solid #38bdf8; }
        .title { font-size: 20px; font-weight: 800; color: #f8fafc; letter-spacing: -0.02em; }
        .subtitle { font-size: 12px; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.1em; font-weight: bold; }
        
        .container { padding: 20px; }
        .instruction-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .instruction-title { color: #facc15; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .instruction-text { color: #94a3b8; font-size: 13px; line-height: 1.5; }
        
        .btn { background: #38bdf8; color: #020617; padding: 12px; border-radius: 8px; border: none; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3); }
        .btn:hover { background: #7dd3fc; transform: translateY(-1px); }
        
        .footer { text-align: center; color: #475569; font-size: 11px; padding-bottom: 15px; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="icons/sentinel-128.png" class="logo-img" alt="Sentinel">
        <div class="title">Sentinel Shield</div>
        <div class="subtitle">Enterprise AI Governance</div>
    </div>
    
    <div class="container">
        <div class="instruction-card">
            <div class="instruction-title">🛡️ Status: Protected</div>
            <div class="instruction-text">
                Your prompts on <b>ChatGPT</b>, <b>Claude</b>, and <b>Gemini</b> are being scanned in real-time.
            </div>
        </div>
        
        <button class="btn" id="dashboardBtn">Enter Mission Control</button>
    </div>
    
    <div class="footer">
        Powered by Xavira Tech Labs &copy; 2026
    </div>

    <script>
        document.getElementById('dashboardBtn').onclick = () => {
            chrome.tabs.create({url: 'http://localhost:3001'});
        };
    </script>
</body>
</html>
