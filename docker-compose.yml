# ════════════════════════════════════════════════════════════════════════════
#  Sentinel Shield v2 — Docker Compose (Local Dev + Cloud Deploy)
#  Usage:
#    Development:   docker compose up
#    Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentinel_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/sentinel.db}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgap}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required. Run pnpm production:seal}
      - LICENSE_MASTER_SECRET=${LICENSE_MASTER_SECRET:?LICENSE_MASTER_SECRET is required. Run pnpm production:seal}
      - ACTOR_HASH_SALT=${ACTOR_HASH_SALT:?ACTOR_HASH_SALT is required. Run pnpm production:seal}
      - LEDGER_MASTER_SALT=${LEDGER_MASTER_SALT:?LEDGER_MASTER_SALT is required. Run pnpm production:seal}
      - LICENSE_SERVER_URL=${LICENSE_SERVER_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - REPORT_EMAIL_TO=${REPORT_EMAIL_TO:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - sentinel_data:/app/vault_docs
      - sentinel_archive:/app/vault_archive
      - sentinel_logs:/app/logs
      - sentinel_chroma:/app/chroma_db
      - sentinel_db:/app/sentinel.db
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sentinel_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - sentinel_net

  # ── PostgreSQL (Cloud Mode) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sentinel
      - POSTGRES_USER=${DB_USER:-sentinel}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (Air-Gap LLM) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - sentinel_net

  ollama-pull:
    image: ollama/ollama:latest
    container_name: sentinel_ollama_pull
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: "sleep 5 && ollama pull ${OLLAMA_MODEL:-llama3.1}"
    networks:
      - sentinel_net
    profiles:
      - airgap

  # ── Redis (Session Cache) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sentinel_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  sentinel_data:
  sentinel_archive:
  sentinel_logs:
  sentinel_chroma:
  sentinel_db:
  postgres_data:
  ollama_models:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  sentinel_net:
    driver: bridge
