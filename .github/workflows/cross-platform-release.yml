name: Sovereign Shield — Cross-Platform Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.5"
  RUST_VERSION: "stable"
  EAS_CLI_VERSION: "18.11.0"

jobs:
  shared-typescript:
    name: Shared SDK + Web Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check shared packages
        run: pnpm cross:check
      - name: Build Next.js operator console
        run: pnpm --filter @sovereign-shield/web build

  desktop-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    needs: shared-typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Linux desktop package
        run: pnpm --filter @sovereign-shield/desktop build
      - uses: actions/upload-artifact@v4
        with:
          name: sovereign-shield-linux
          path: apps/desktop/src-tauri/target/release/bundle/**

  desktop-macos:
    name: macOS DMG + Notarization Gate
    runs-on: macos-latest
    needs: shared-typescript
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify signing inputs
        run: |
          test -n "$TAURI_PRIVATE_KEY" || echo "TAURI_PRIVATE_KEY missing: unsigned staging build only"
          test -n "$APPLE_ID" || echo "APPLE_ID missing: notarization skipped"
      - name: Build macOS desktop package
        run: pnpm --filter @sovereign-shield/desktop build
      - uses: actions/upload-artifact@v4
        with:
          name: sovereign-shield-macos
          path: apps/desktop/src-tauri/target/release/bundle/**

  desktop-windows:
    name: Windows MSI
    runs-on: windows-latest
    needs: shared-typescript
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Windows desktop package
        run: pnpm --filter @sovereign-shield/desktop build
      - uses: actions/upload-artifact@v4
        with:
          name: sovereign-shield-windows
          path: apps/desktop/src-tauri/target/release/bundle/**

  mobile-android:
    name: Android APK/AAB Gate
    runs-on: ubuntu-latest
    needs: shared-typescript
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check mobile shell
        run: pnpm --filter @sovereign-shield/mobile check
      - name: Build Android with buyer Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN not configured; Android binary build skipped for this dry-run."
            exit 0
          fi
          pnpm --dir apps/mobile dlx eas-cli@${{ env.EAS_CLI_VERSION }} build --platform android --profile production --non-interactive

  mobile-ios:
    name: iOS TestFlight Gate
    runs-on: macos-latest
    needs: shared-typescript
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check mobile shell
        run: pnpm --filter @sovereign-shield/mobile check
      - name: Build iOS with buyer Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN not configured; iOS TestFlight build skipped for this dry-run."
            exit 0
          fi
          pnpm --dir apps/mobile dlx eas-cli@${{ env.EAS_CLI_VERSION }} build --platform ios --profile production --non-interactive
