name: Sovereign Shield v2 — CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.5"
  DEPLOYMENT_MODE: airgap
  DATABASE_URL: "sqlite:///./test_sentinel.db"
  JWT_SECRET_KEY: "ci_jwt_secret_64_chars_minimum_for_fail_closed_loader_2026_xavira"
  LICENSE_MASTER_SECRET: "ci_license_secret_64_chars_minimum_for_fail_closed_loader_2026_xavira"
  ACTOR_HASH_SALT: "ci_actor_hash_salt_32_chars_minimum_2026"
  LEDGER_MASTER_SALT: "ci_ledger_hash_salt_32_chars_minimum_2026"
  ALLOWED_ORIGINS: "http://localhost:3000"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Python Backend Tests
  # ────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🐍 Backend Tests + Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio bandit safety pyyaml

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 30

      - name: Security scan (bandit)
        run: |
          bandit -r backend/ \
            -x backend/tests \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json || true

      - name: Dependency vulnerability scan (safety)
        run: |
          safety check -r requirements.txt --json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

      - name: Generate deployment pack
        run: python scripts/generate_deployment_pack.py

      - name: Generate architecture handoff PDF
        run: python scripts/generate_handoff_pdf.py

      - name: Upload handoff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: buyer-handoff-artifacts
          path: |
            logs/deployment_pack/**
            logs/handoff/**
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # Frontend Build
  # ────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: ⚡ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --ignore-workspace --frozen-lockfile
        working-directory: frontend

      - name: Static route check
        run: |
          test -f site/index.html
          test -f site/ops/index.html
          test -f site/demo/index.html
          test -f site/pricing/index.html
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          SOVEREIGN_STATIC_BUILD: "true"

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-build-artifacts
          path: |
            frontend/dist/**
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # Cross-Platform Contract Validation
  # ────────────────────────────────────────────────────────────────────────
  cross-platform-validation:
    name: 🧭 Cross-Platform Static Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type-check shared contracts
        run: pnpm cross:check

      - name: Type-check web operator console
        run: pnpm --filter @sovereign-shield/web check

      - name: Type-check desktop operator console
        run: pnpm --filter @sovereign-shield/desktop check

      - name: Type-check mobile executive console
        run: pnpm --filter @sovereign-shield/mobile check

      - name: Build web operator console
        run: pnpm --filter @sovereign-shield/web build

      - name: Cross-platform architecture doctor
        run: python3 scripts/cross_platform_doctor.py

  # ────────────────────────────────────────────────────────────────────────
  # Policy YAML Validation
  # ────────────────────────────────────────────────────────────────────────
  policy-validation:
    name: 📋 Policy YAML Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install YAML tools
        run: pip install pyyaml

      - name: Validate all YAML policies
        run: |
          python -c "
          import yaml, os, sys
          errors = []
          for root, _, files in os.walk('presets'):
              for f in files:
                  if f.endswith('.yaml'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              data = yaml.safe_load(fh)
                          assert isinstance(data, dict), f'{path}: must be dict'
                          assert 'rules' in data, f'{path}: missing rules key'
                          print(f'✅ {path} — {len(data[\"rules\"])} rules')
                      except Exception as e:
                          errors.append(f'❌ {path}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'All policy YAMLs valid.')
          "

  # ────────────────────────────────────────────────────────────────────────
  # Docker Build Validation
  # ────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t sovereign-backend:test .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t sovereign-frontend:test .
